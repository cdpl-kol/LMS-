services:
  - type: web
    name: smart-lms-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-lms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

databases:
  - name: smart-lms-db
    databaseName: lms_db
    user: lms_user
    plan: free
